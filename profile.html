<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Tinos:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="template/components.css">
  <link rel="stylesheet" href="template/layout.css">
  <style>
    body { background: #fffaf7; font-family: 'Tinos', serif; }
    .logo { font-family: 'Cormorant Garamond', serif; font-size: 2rem; color: #e63946; margin-bottom: 24px; display: inline-block; }
    main { background: #fff; border-radius: 18px; box-shadow: 0 2px 16px #ffd6e0; margin-top: 32px; }
    h2 { color: #e63946; }
    p { color: #1c2b3a; }
  </style>
</head>
<body>
  <header class="main-header">
    <button onclick="history.back()" class="icon-btn" aria-label="Volver">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#e63946" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <a href="index.html" class="logo" style="text-decoration:none;color:inherit;cursor:pointer;">Flexiway</a>
    <div class="header-actions">
      <button id="notificationBtn" class="icon-btn" aria-label="Notificaciones">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 8a6 6 0 10-12 0c0 7-3 7-3 7h18s-3 0-3-7"></path>
          <path d="M13.73 21a2 2 0 01-3.46 0"></path>
        </svg>
      </button>
      <button class="icon-btn" aria-label="Perfil" id="profileBtn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="7" r="4"></circle>
          <path d="M5.5 21a8.38 8.38 0 0113 0"></path>
        </svg>
      </button>
    </div>
  </header>
  <main style="padding:24px;max-width:720px;margin:auto;">
    <a href="index.html" class="logo" style="text-decoration:none;color:inherit;cursor:pointer;font-size:2rem;">Flexiway</a>
    <h2>Mi Perfil</h2>
    <p>Resumen demo del estado financiero actual.</p>

    <section id="profileSummary" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-top:24px;"></section>

    <section style="background:#fff7e6;border-radius:16px;padding:18px 20px;margin-top:20px;box-shadow:0 2px 12px #ffd6e0;">
      <h3 style="margin-top:0;color:#e63946;">Lectura rápida</h3>
      <ul id="profileInsights" style="margin:0;padding-left:18px;color:#1c2b3a;line-height:1.7;"></ul>
    </section>

    <a href="edit-profile.html" style="display:inline-flex;align-items:center;justify-content:center;margin-top:18px;padding:12px 18px;border-radius:999px;background:#e63946;color:#fff;text-decoration:none;font-weight:700;">Editar datos financieros</a>
  </main>

  <script>
    const financialData = JSON.parse(localStorage.getItem('financialData') || '{}');
    const profileSummary = document.getElementById('profileSummary');
    const profileInsights = document.getElementById('profileInsights');

    const spent = Number(financialData.spent) || 0;
    const budget = Number(financialData.budget) || 0;
    const possibleSavings = Number(financialData.possibleSavings) || 0;
    const debts = Number(financialData.debts) || 0;
    const creditDueInDays = Number(financialData.creditDueInDays) || 0;
    const usage = budget > 0 ? (spent / budget) * 100 : 0;
    const remaining = Math.max(budget - spent - possibleSavings - debts, 0);

    const cards = [
      { label: 'Presupuesto mensual', value: '$' + budget.toLocaleString() },
      { label: 'Gasto actual', value: '$' + spent.toLocaleString() },
      { label: 'Ahorro posible', value: '$' + possibleSavings.toLocaleString() },
      { label: 'Uso del presupuesto', value: usage.toFixed(1) + '%' }
    ];

    profileSummary.innerHTML = cards.map((card) => `
      <article style="background:#fff;border-radius:16px;padding:18px;box-shadow:0 2px 12px #ffd6e0;">
        <p style="margin:0 0 8px;color:#b42318;font-weight:700;">${card.label}</p>
        <strong style="font-size:1.5rem;color:#1c2b3a;">${card.value}</strong>
      </article>
    `).join('');

    const insights = [
      usage >= 80
        ? 'Tu gasto ya supera el 80% del presupuesto mensual.'
        : 'Tu nivel de gasto todavía se mantiene bajo control.',
      creditDueInDays > 0
        ? `Tu próxima tarjeta vence en ${creditDueInDays} día(s).`
        : 'No hay vencimientos de tarjeta próximos registrados.',
      remaining > 0
        ? `Después de gastos, ahorro y deudas todavía quedarían $${remaining.toLocaleString()} disponibles.`
        : 'El presupuesto restante ya está comprometido por completo.'
    ];

    profileInsights.innerHTML = insights.map((item) => `<li>${item}</li>`).join('');
  </script>
</body>
</html>
